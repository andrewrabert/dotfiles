hide-soft-keyboard-on-startup = false
soft-keyboard-toggle-behavior = disable
bell-character = ignore
terminal-toolbar-height = 0.8
volume-keys = volume
extra-keys = [ \
 [ \
     {key: 'TAB', popup: {macro: "SHIFT TAB"}}, \
     {key: '~'}, \
     {key: '-'}, \
     {key: DRAWER, popup: {macro: "KEYBOARD"}}, \
     {key: 'UP'}, \
     {key: 'BACKSLASH'}, \
     {key: '/'}, \
     {key: 'DEL'} \
 ], \
 [ \
     {key: 'ESC'}, \
     {key: 'SHIFT'}, \
     {key: 'CTRL'}, \
     {key: 'ALT'}, \
     {key: 'LEFT'}, \
     {key: 'DOWN'}, \
     {key: 'RIGHT'}, \
     {key: ':'} \
 ] \
]
